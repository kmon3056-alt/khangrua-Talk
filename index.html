<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khangrua Talk - ระบบปรึกษาออนไลน์</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <header>
            <h1>Khangrua Talk</h1>
            <p>พื้นที่ปรึกษาสำหรับชาวมหาวิทยาลัย</p>
        </header>

        <div id="chat-box" class="chat-box">
            </div>

        <form id="chat-form">
            <input type="text" id="message-input" placeholder="พิมพ์ข้อความที่ต้องการปรึกษา..." required autocomplete="off">
            <button type="submit">ส่ง</button>
        </form>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
